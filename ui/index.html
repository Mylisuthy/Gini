<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gini OS - Blackboard Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>Gini OS</h1>
            </div>
            <nav>
                <a href="#" class="nav-item active" data-target="chat-view">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Gini Router
                </a>
                <a href="#" class="nav-item" data-target="blackboard-view">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Blackboard
                </a>
            </nav>
            <div class="user-profile">
                <div class="avatar">U</div>
                <div class="user-info">
                    <span class="user-name">Usuario Corporativo</span>
                    <span class="user-role">Product Owner</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Chat View -->
            <section id="chat-view" class="view-section active">
                <header class="view-header glass-panel">
                    <h2>Chat con Gini</h2>
                    <p class="subtitle">Enrutador Semántico de Entrada</p>
                </header>
                
                <div class="chat-container glass-panel">
                    <div class="chat-messages" id="chat-messages">
                        <div class="message system-msg">
                            <div class="msg-bubble">Hola, soy Gini. ¿Cuál es tu nuevo requerimiento?</div>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Ej: Crea un portal de pagos corporativo..." autocomplete="off">
                        <button id="send-btn" class="primary-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Blackboard View -->
            <section id="blackboard-view" class="view-section">
                <header class="view-header glass-panel">
                    <h2>Pizarra Compartida</h2>
                    <p class="subtitle">Gestión de Estado Global (Unify)</p>
                    <button id="refresh-board" class="secondary-btn">Actualizar Tablero</button>
                </header>

                <div class="board-container">
                    <div class="kanban-column" id="col-backlog">
                        <div class="column-header"><span class="dot dot-gray"></span> BACKLOG</div>
                        <div class="cards-container"></div>
                    </div>
                    <div class="kanban-column" id="col-ready">
                        <div class="column-header"><span class="dot dot-blue"></span> READY_FOR_DEV</div>
                        <div class="cards-container"></div>
                    </div>
                    <div class="kanban-column" id="col-progress">
                        <div class="column-header"><span class="dot dot-yellow"></span> IN_PROGRESS</div>
                        <div class="cards-container"></div>
                    </div>
                    <div class="kanban-column" id="col-qa">
                        <div class="column-header"><span class="dot dot-purple"></span> QA / REJECTED</div>
                        <div class="cards-container"></div>
                    </div>
                    <div class="kanban-column" id="col-done">
                        <div class="column-header"><span class="dot dot-green"></span> DONE</div>
                        <div class="cards-container"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for details -->
    <div id="details-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <button class="close-btn">&times;</button>
            <h3 id="modal-title">Detalles del Epic</h3>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
